<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Access Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e4e4e7;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
    }
    .shield { font-size: 80px; margin-bottom: 20px; }
    h1 { font-size: 28px; color: #ef4444; margin-bottom: 8px; }
    .domain { 
      font-size: 18px; 
      color: #38bdf8; 
      background: #1a1d27; 
      padding: 8px 20px; 
      border-radius: 8px; 
      display: inline-block;
      margin: 16px 0;
      font-family: monospace;
    }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .back-btn {
      margin-top: 24px;
      padding: 10px 28px;
      background: #38bdf8;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .back-btn:hover { opacity: 0.9; }
    .info {
      margin-top: 32px;
      padding: 16px;
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid #1e293b;
      border-radius: 8px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield">🛡️</div>
    <h1>ACCESS BLOCKED</h1>
    <div class="domain" id="blockedDomain">this website</div>
    <p>This website has been blocked by Smart Web Content Filter.<br/>
    It matches a category in your active filter rules.</p>
    <button class="back-btn" onclick="history.back()">← Go Back</button>
    <div class="info">
      🔒 This block is enforced at the network level using declarativeNetRequest.<br/>
      To unblock, open the extension popup and modify your filter rules.
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const domain = params.get("domain");
    if (domain) document.getElementById("blockedDomain").textContent = domain;
  </script>
</body>
</html>
